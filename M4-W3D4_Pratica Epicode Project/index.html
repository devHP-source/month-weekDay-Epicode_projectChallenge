<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/devByPau-favicon.jpg" type="image/jpeg" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" type="text/css" href="./styles.css" />
    <title>Database di Utenti | M4-W3D4</title>
</head>
<body>

    <header class="app-header text-center py-5">
        <h1 class="app-title"><ion-icon name="document-lock-outline"></ion-icon> Database di Utenti</h1>
        <p class="app-subtitle">Cerca e filtra gli utenti per nome, username o email</p>
    </header>

    <main class="container pb-5">

        <!-- Barra dei filtri -->
        <div class="card filter-card shadow-sm mb-4">
            <div class="card-body">
                <div class="row g-3 align-items-end">

                    <div class="col-12 col-md-4">
                        <label class="form-label">Filtra per</label>
                        <div class="dropdown">
                            <button class="btn btn-outline-primary dropdown-toggle w-100" type="button"id="filterFieldDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                                Nome
                            </button>
                            <ul class="dropdown-menu w-100" aria-labelledby="filterFieldDropdown">
                                <li><button class="dropdown-item active" type="button" data-field="name">Nome</button></li>
                                <li><button class="dropdown-item" type="button" data-field="username">Username</button></li>
                                <li><button class="dropdown-item" type="button" data-field="email">Email</button></li>
                            </ul>
                        </div>
                    </div>

                    <div class="col-12 col-md-8">
                        <label for="searchInput" class="form-label">Cerca</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
                            <input type="text" class="form-control" id="searchInput"
                                placeholder="Digita per filtrare i risultati..." autocomplete="off" />
                        </div>
                    </div>

                </div>
            </div>
        </div>

        
        <div id="loadingState" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <!-- loading -->
            </div>
            <p class="mt-3 text-muted">Caricamento utenti in corso...</p>
        </div>

        <div id="errorState" class="alert alert-danger d-none" role="alert">
            <!-- Impossibile caricare gli utenti: ${error.message} -->
        </div>

        <p id="resultsCount" class="results-count text-muted d-none">
            <!-- `${list.length} utenti trovati` -->
        </p>

        <!-- users Tabella -->
        <div class="table-responsive">
            <table class="table table-hover align-middle users-table d-none" id="usersTable">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Nome</th>
                        <th scope="col">Username</th>
                        <th scope="col">Email</th>
                        <th scope="col">Telefono</th>
                        <th scope="col">Sito web</th>
                        <th scope="col">Azienda</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody"></tbody>
            </table>
        </div>

    </main>

    <script src="https://kit.fontawesome.com/1205482781.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>
    <script src="./main.js"></script>
</body>
</html>
