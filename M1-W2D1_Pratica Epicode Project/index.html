<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="assets/devByPau-favicon.jpg" type="image/jpeg" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Card</title>
  </head>
  <body>
    <main>

    <!-- CONTAINER -->
    <div class="container">
      <!-- CARD -->
      <div class="container-card">
        <img src="./assets/terrace.png" alt="Terrace"/>

        <!-- OVERLAY BLACK on HOVER -->
        <div class="overlay">

        </div>

        <!-- SAVE BUTTON -->
        <a href="#"><button class="save-btn">Save</button></a>

        <!-- CTA BUTTONS  -->
        <div class="cta-btn">

          <button class="btn-arrow">
            <ion-icon name="arrow-forward-outline"></ion-icon>
              <a href="#">Westwing</a>
          </button>

          <button class="btn-circle">
            <a href="#"><ion-icon name="share-outline"></ion-icon></a>
          </button>

          <button class="btn-circle">
            <a href="#"><ion-icon name="ellipsis-horizontal-outline"></ion-icon></a>
          </button>

        </div>
      </div>
    </div>

    </main>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  </body>
</html>
