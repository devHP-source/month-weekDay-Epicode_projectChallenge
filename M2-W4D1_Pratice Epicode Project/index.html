<!-- PART 2: VERSION 2 -->
<main>
    <div class="main-container">

        <header>
            <h1>Job Searcher</h1>
            <p class="description">Find the right opportunity for you</p>
        </header>

        <form action="#" id="searchForm" class="search-container">
            <div class="input-container">
                <ion-icon name="search-outline" class="formIcon"></ion-icon>
                <input type="text" id="jobTitle" placeholder="Insert Job Title">
            </div>

            <div class="input-container">
                <ion-icon name="location-outline" class="formIcon"></ion-icon>
                <input type="text" id="location" placeholder="Insert Job Location">
            </div>

            <button type="button" id="searchBtn">Search</button>
        </form>

        <div class="results-job">
            <table>
                <thead>
                    <tr>
                        <th>Titolo</th>
                        <th>Location</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    <tr>
                        <td colspan="2" class="placeholder-cell">Compila i campi</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</main>




    <script src="./main.js"></script>
