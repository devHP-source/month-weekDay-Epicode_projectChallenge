<!--
PARTE 2: 
* Nella pagina HTML, inserisci 2 input di tipo testo
(uno per la location e uno per il titolo lavorativo, ricordati di diversificarli con un id)
e un bottone con valore “cerca”

* Al click del bottone, il codice deve raccogliere i valori dei due input e darli in pasto
alla funzione che hai creato nella parte 1. 

Dopo aver raccolto ed elaborato i dati, e’ il momento di mostrare i risultati sulla pagina: 
Puoi scegliere tu se utilizzare un semplice ul / li oppure una tabella 
Vai passo per passo e usa molti console.log per capire eventualmente dove sbagli

SUGGERIMENTO: ti servira’ un ciclo for!
-->

<main>
    <form action="#">
        <input id="title" type="text" placeholder="Job Title">
        <input id="location" type="text" placeholder="Job Location">
        <button type="submit">Send</button>
    </form>

    <div>
        <table id="table">
            <tr>
                <th>Lavoro</th>
                <th>Location</th>
            </tr>
            
        </table>
    </div>

</main>
    <script src="./main.js"></script>
