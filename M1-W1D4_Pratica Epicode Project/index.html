<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <link rel="icon" href="./assets/devByPau-favicon.jpg" type="image/jpeg">
    <title>Amazon Challenge</title>
</head>
<body>

<header id="#top">
    <div class="logo">
        <a href="#"><img src="./assets/logo.png" alt="Amazon Logo"></a>
    </div>
    <nav>
        <ul class="navbar-menu">
            <li><a href="#">All</a></li>
            <li><a href="#">Today's deals</a></li>
            <li><a href="#">Customer Service</a></li>
            <li><a href="#">Registry</a></li>
            <li><a href="#">Gift Cards</a></li>
            <li><a href="#">Sell</a></li>
        </ul>
    </nav>
</header>

<main>
    <div class="advertise">
        <div class="advertise-text">
            <span>Shop All Holiday Gift Cards</span>
        </div>
    </div>
    <!-- BANNER BACKGROUND IMAGE -->
    <div class="mainBanner" id="mainBanner">
        <h1>Holiday Gift Guides</h1>
        <h3>Be a go-gifter</h3>
    </div>

    <!-- first ROW -->
    <div class="rowOne">
        <div class="containerTitle">
            <span class="title">Find the Perfect gift</span>
            <span class="subtitle" id="link"><a href="#">Shop now</a></span>
        </div>

        <!-- CARD CONTAINER -->
        <div class="card-container">
            <div class="card-image"> <!--IMAGE 1 -->
                <img src="./assets/tablet.jpg" alt="Tablet">
            </div>
            <div class="card-image"> <!--IMAGE 2 -->
                <img src="./assets/laptop.jpg" alt="Laptop">
            </div>
            <div class="card-image"> <!--IMAGE 3 -->
                <img src="./assets/smartWatch.jpg" alt="Smartwatch">
            </div>
            <div class="card-image"> <!--IMAGE 4 -->
                <img src="./assets/dogCat.jpg" alt="Animal Pets">
            </div>
        </div>
    </div>

    <!-- second ROW -->
    <div class="banner">
        <img src="./assets/VRbanner.png" alt="VR Banner" id="banner">
        <span class="title">Play the Gifting Game</span>
        <span class="subtitle" id="link"><a href="#">Shop gaming</a></span>
    </div>
    
    <!-- third ROW -->
    <div class="banner">
        <img src="./assets/speakerBanner.png" alt="Speaker Banner" id="banner">
        <span class="title">The Sound of Cheer</span>
        <span class="subtitle" id="link"><a href="#">Shop Audio & Accessories</a></span>
    </div>

</main>

<footer>
        <div class="scrollUp" id="back-to-top">
            <a href="#">Back to top</a>
        </div>
        <div class="footer-logo">
            <a href="#top"><img src="./assets/logo.png" alt="Amazon Footer Logo"></a>
        </div>
    </footer>
</body>
</html>
