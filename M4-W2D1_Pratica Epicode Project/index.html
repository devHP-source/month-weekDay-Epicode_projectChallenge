<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/devByPau-favicon.jpg" type="image/jpeg"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles.css">
    <title>Pexels Gallery</title>
</head>
<body class="bg-light">

    <header class="bg-white border-bottom py-4 mb-4">
        <div class="container">
            <h1 class="h3 mb-1">Pexels Gallery</h1>
            <p class="text-muted mb-0">Search the Pexels library and browse the results.</p>
        </div>
    </header>

    <main class="container pb-5">

        <form id="search-form" class="row justify-content-center mb-3">
            <div class="col-lg-6">
                <div class="position-relative">
                    <div class="input-group input-group-lg">
                        <input id="search-input" type="search" class="form-control" placeholder="Try mountains, coffee, city..." aria-label="Search Pexels" autocomplete="off" required>
                        <button class="btn btn-dark" type="submit">Search</button>
                    </div>
                    <ul id="suggestions" class="dropdown-menu w-100">
                        <!-- Suggestions list thru JS -->
                    </ul>
                </div>
            </div>
        </form>

        <p id="summary" class="text-center text-muted"></p>

        <div id="spinner" class="text-center py-5 d-none">
            <div class="spinner-border text-secondary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <div id="error" class="alert alert-danger d-none" role="alert">
            <!-- const errorBox -->
        </div>

        <div id="empty-state" class="text-center py-5">
            <p id="empty-message" class="text-muted">Nothing searched yet.</p>
            <button id="random-button" type="button" class="btn btn-outline-dark btn-lg">Random search</button>
        </div>

        <div id="gallery" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
            <!-- const gallery -->
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="./main.js"></script>
</body>
</html>
