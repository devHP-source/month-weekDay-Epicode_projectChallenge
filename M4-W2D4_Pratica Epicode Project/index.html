<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <link rel="icon" href="./assets/devByPau-favicon.jpg" type="image/jpeg"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Book Shop | M4-W2D4</title>
</head>
<body>

    <!-- Navbar with brand + live search bar -->
    <nav class="navbar navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1"><ion-icon name="book-outline"></ion-icon> devByPau Books</span>
            <input id="searchInput" class="form-control w-auto flex-grow-1 ms-md-4 search-bar" type="search" placeholder="Search by title (type more than 3 letters)…" aria-label="Search books">
        </div>
    </nav>

    <div class="container my-4">
        <div class="row g-4">

            <!-- left grid -->
            <div class="col-lg-8">
                <p id="booksStatus" class="text-muted small mb-3">
                    <!-- "No results" message -->
                </p>

                <div id="booksRow" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
                    <!-- Book cards thru js -->
                </div>
            </div>

            <!-- right grid -->
            <div class="col-lg-4">
                <div class="card cart-panel position-sticky shadow-sm">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span class="fw-bold">
                            <ion-icon name="cart-outline"></ion-icon> Cart 
                            <span id="cartCount" class="badge bg-primary">0</span>
                        </span>
                        <button id="emptyCartBtn" class="btn btn-sm btn-outline-danger" type="button" disabled>
                            <ion-icon name="trash-outline"></ion-icon> Empty cart
                        </button>
                    </div>

                    <ul id="cartList" class="list-group list-group-flush">
                        <!-- Cart rows are injected here by main.js -->
                    </ul>

                    <div class="card-footer d-flex justify-content-between align-items-center">
                        <span class="text-muted">Total</span>
                        <span id="cartTotal" class="fw-bold">€0.00</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>
    <script src="./main.js"></script>
</body>
</html>
