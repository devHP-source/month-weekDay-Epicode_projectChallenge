<!DOCTYPE html>

<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="icon" href="./logo/devByPau-favicon.jpg" type="image/jpeg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" type="text/css" href="./style.css" />
  <title>EpiBooks</title>
</head>

<body>
  <div class="container-fluid">
    <div class="row">
      <!--SIDEBAR VERTICAL-->
      <div class="col-2">
        <nav class="navbar navbar-expand-md navbar-white bg-navbar fixed-left justify-content-between" id="sidebar">
          <div class="nav-container">
            <a class="navbar-brand" href="./index.html">
              <img src="./logo/Spotify_Logo.png" alt="Spotify_Logo" width="131" height="40" />
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
              aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
              <div class="navbar-nav">
                <ul>
                  <li>
                    <a class="nav-item nav-link" href="./index.html"><i class="fas fa-home fa-lg"></i>
                      &nbsp; Home
                    </a>
                  </li>
                  <li>
                    <a class="nav-item nav-link" href="#"><i class="fas fa-book-open fa-lg"></i>
                      &nbsp; Your Library
                    </a>
                  </li>
                  <li>
                    <div class="input-group mt-3">
                      <input type="text" class="form-control" id="searchField" placeholder="Search"
                        aria-label="Search"/>
                      <button class="btn btn-outline-secondary" type="button" id="button-search">
                        GO
                      </button>
                    </div>
                  </li>
                </ul>
              </div>
            </div>
          </div>

          <div class="nav-btn">
            <button class="btn signup-btn" type="button">Sign Up</button>
            <button class="btn login-btn" type="button">Login</button>
            <a href="#">Cookie Policy</a> |
            <a href="#"> Privacy</a>
          </div>
        </nav>
      </div>
      <!--END SIDEBAR VERTICAL-->

      <!--MAIN-->
      <div class="col-12 col-md-9 offset-md-3 py-4">

        <div class="d-flex justify-content-end align-items-center mb-3"> <!-- running cart total -->
          <span class="text-white fw-bold">Cart: <span id="cartTotal">0.00</span> &euro;</span>
        </div>

        <h2 class="text-white mb-4">EpiBooks</h2>

        <!-- Bootstrap Spinner -->
        <div id="spinner" class="text-center my-5">
          <div class="spinner-border text-light" role="status">

          </div>
        </div>

        <!-- toggleAlert() if fetch() fails -->
        <div id="errorAlert" class="alert alert-danger d-none" role="alert">
          Something went wrong while loading the books, Please try again later.
        </div>


        <div id="bookList" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 g-4">
        <!-- one column per book appendChild() -->
        </div>
      </div>
      <!--END MAIN-->
    </div>
  </div>

  <script src="https://kit.fontawesome.com/1205482781.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>
  <script src="./main.js"></script>
</body>

</html>
